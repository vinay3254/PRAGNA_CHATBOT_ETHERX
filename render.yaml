services:
  # ─── Backend: Flask API ───────────────────────────────────────────────────
  - type: web
    name: etherx-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Render injects $PORT at runtime and requires the service to bind to it -
    # gunicorn defaults to 127.0.0.1:8000 otherwise, which fails Render's port
    # check. Note config.PORT/FLASK_PORT has NO effect here: gunicorn imports
    # the `app` WSGI callable directly, so app.py's `if __name__ == '__main__'`
    # block (the only place that reads config.PORT) never runs.
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: LLM_PROVIDER
        value: standard # 'standard' mode uses the real fallback chain below
                         # (DEFAULT_MODEL_FALLBACKS) via services/llm.py
                         # _request_completion. ollama_only mode has ZERO
                         # fallback - not worth the risk on a free cloud quota.
      - key: OLLAMA_API_URL
        value: https://ollama.com # Ollama's hosted cloud API - serves :cloud
                                   # models with no self-hosted daemon needed.
                                   # Only works for :cloud-tagged models; swap
                                   # to a self-hosted URL if you add a VPS -
                                   # note this URL is shared by ALL ollama:
                                   # candidates below, so the non-:cloud ones
                                   # (Miku, Jenteck-GPT) will fail until then.
      - key: OLLAMA_MODEL
        value: qwen3-coder-next:cloud # used by the agent subsystem
                                       # (services/code_agent.py) and the
                                       # /api/test-ollama diagnostic route,
                                       # not by the main chat path in
                                       # 'standard' mode (that uses
                                       # DEFAULT_MODEL_KEY below).
      - key: OLLAMA_API_KEY
        sync: false # REQUIRED: your Ollama Cloud API key from
                     # ollama.com/settings/keys. Authenticates requests to
                     # https://ollama.com for :cloud models.
      - key: DEFAULT_MODEL_KEY
        value: ollama:qwen3-coder-next:cloud
      - key: DEFAULT_MODEL_FALLBACKS
        # Order: 2 real cloud models (both work with just OLLAMA_API_KEY,
        # no VPS) -> Groq (needs GROQ_API_KEY) -> the two community models,
        # which will fail until they're pulled on a self-hosted Ollama and
        # OLLAMA_API_URL points there instead of ollama.com.
        value: ollama:qwen3-coder-next:cloud,ollama:nemotron-3-super:cloud,groq:llama-3.1-8b-instant,ollama:Ravishka/Miku,ollama:jensonodigie/Jenteck-GPT
      - key: CLASSIFIER_MODEL_KEY
        value: ollama:qwen3-coder-next:cloud
      - key: CLASSIFIER_FALLBACKS
        value: ollama:qwen3-coder-next:cloud,ollama:nemotron-3-super:cloud,groq:llama-3.1-8b-instant,ollama:Ravishka/Miku,ollama:jensonodigie/Jenteck-GPT
      - key: GROQ_API_KEY
        sync: false # RECOMMENDED: safety net if Ollama Cloud's free quota
                     # runs out mid-week. Free key at console.groq.com
      - key: SERPER_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false # REQUIRED: set a long random value in Render dashboard.
                     # If left unset, auth tokens are signed with the
                     # publicly-known default in config.py - never leave unset.
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Set to the etherx-frontend URL once known (e.g.
                     # https://etherx-frontend.onrender.com). Defaults to "*"
                     # (any origin) if left unset.
      - key: FLASK_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ─── Frontend: Vite/React ─────────────────────────────────────────────────
  - type: web
    name: etherx-frontend
    runtime: static
    rootDir: chatbot-ui-vite
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set to your backend URL after deploying backend
