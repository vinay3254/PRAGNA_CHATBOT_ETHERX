services:
  # ─── Backend: Flask API ───────────────────────────────────────────────────
  - type: web
    name: etherx-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Render injects $PORT at runtime and requires the service to bind to it -
    # gunicorn defaults to 127.0.0.1:8000 otherwise, which fails Render's port
    # check. Note config.PORT/FLASK_PORT has NO effect here: gunicorn imports
    # the `app` WSGI callable directly, so app.py's `if __name__ == '__main__'`
    # block (the only place that reads config.PORT) never runs.
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: LLM_PROVIDER
        value: ollama_only # Ollama is primary. Render can't host Ollama itself -
                            # point OLLAMA_API_URL at an externally reachable
                            # Ollama instance (VPS, RunPod, Fly.io, etc).
      - key: OLLAMA_API_URL
        sync: false # REQUIRED: URL of your externally hosted Ollama instance,
                     # e.g. https://ollama.yourdomain.com or a Tailscale address.
                     # Must be reachable from Render's network. Put auth in front
                     # of it (Ollama itself has no built-in auth).
      - key: OLLAMA_MODEL
        value: Ravishka/Miku # must match a model already pulled (or a :cloud
                              # model signed in) on the Ollama host. Matches
                              # local backend/.env - change here if the host's
                              # available models differ.
      - key: DEFAULT_MODEL_KEY
        value: ollama:Ravishka/Miku
      - key: DEFAULT_MODEL_FALLBACKS
        value: ollama:Ravishka/Miku,ollama:jensonodigie/Jenteck-GPT,ollama:qwen3-coder-next:cloud
      - key: CLASSIFIER_MODEL_KEY
        value: ollama:Ravishka/Miku
      - key: CLASSIFIER_FALLBACKS
        value: ollama:Ravishka/Miku,ollama:jensonodigie/Jenteck-GPT,ollama:qwen3-coder-next:cloud
      - key: GROQ_API_KEY
        sync: false # You will set this in Render dashboard
      - key: SERPER_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false # REQUIRED: set a long random value in Render dashboard.
                     # If left unset, auth tokens are signed with the
                     # publicly-known default in config.py - never leave unset.
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Set to the etherx-frontend URL once known (e.g.
                     # https://etherx-frontend.onrender.com). Defaults to "*"
                     # (any origin) if left unset.
      - key: FLASK_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ─── Frontend: Vite/React ─────────────────────────────────────────────────
  - type: web
    name: etherx-frontend
    runtime: static
    rootDir: chatbot-ui-vite
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set to your backend URL after deploying backend
